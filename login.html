<script>
    document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('secureAuthLoginForm');
    const emailField = document.getElementById('authEmailAddress');
    const passwordField = document.getElementById('authPasswordKey');
    const alertBanner = document.getElementById('authPortalAlertBanner');
    
    // Profile Toggle buttons mapping elements tracks hooks
    const ownerTab = document.getElementById('profileTabOwner');
    const clientTab = document.getElementById('profileTabClient');
    const maskToggler = document.getElementById('passwordMaskToggler');

    // Default configuration footprint: Active role is initialized to "owner"
    let activeOperationalRole = "owner";

    if (loginForm && emailField && passwordField && alertBanner && ownerTab && clientTab && maskToggler) {
        
        // --- PROFILE ROLE HOTSWAP HOOKS CONTROLLER ---
        ownerTab.addEventListener('click', () => {
            clientTab.classList.remove('tab-active');
            ownerTab.classList.add('tab-active');
            activeOperationalRole = "owner";
        });

        clientTab.addEventListener('click', () => {
            ownerTab.classList.remove('tab-active');
            clientTab.classList.add('tab-active');
            activeOperationalRole = "client";
        });

        // --- PASSWORD VISIBILITY MASK UNMASK HOOKS CONTROLLER ---
        maskToggler.addEventListener('click', () => {
            const isMaskedState = passwordField.getAttribute('type') === 'password';
            passwordField.setAttribute('type', isMaskedState ? 'text' : 'password');
            
            // Subtle color signal hotswap indicator mapping parameters
            maskToggler.style.color = isMaskedState ? '#f59e0b' : '#475569';
        });

        // --- MASTER HANDSHAKE CRITICAL FORM INTERCEPTION SUBMIT ACTION ---
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Intercept browser native post reload behaviors safely

            // Wipe slate dynamic alert banners parameters variables states
            alertBanner.classList.remove('alert-active');
            alertBanner.innerText = "";

            // Clear individual row input errors incidence identifiers
            const inputsList = loginForm.querySelectorAll('input');
            inputsList.forEach(input => {
                input.closest('.auth-input-group')?.classList.remove('field-input-invalid');
            });

            let criticalValidationPassFlag = true;
            let emptyFieldIdentified = false;

            // Loop checking empty input fields parameters status parameters
            for (let i = 0; i < inputsList.length; i++) {
                const currentInputNode = inputsList[i];
                if (currentInputNode.hasAttribute('required') && !currentInputNode.value.trim()) {
                    emptyFieldIdentified = true;
                    criticalValidationPassFlag = false;
                    currentInputNode.closest('.auth-input-group')?.classList.add('field-input-invalid');
                }
            }

            // A. EMPTY FIELD EXCEPTION BANNER TRIGGER
            if (emptyFieldIdentified) {
                alertBanner.innerText = "Please fill the fields before deploying token verification.";
                alertBanner.classList.add('alert-active');
                return;
            }

            // B. SPECIFIC EMAIL RFC CONFORMANCE REGEX PATTERN FILTER
            const emailPatternStructure = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPatternStructure.test(emailField.value.trim())) {
                criticalValidationPassFlag = false;
                emailField.closest('.auth-input-group')?.classList.add('field-input-invalid');
                alertBanner.innerText = "Please enter a mathematically valid secure email configuration track address.";
                alertBanner.classList.add('alert-active');
                return;
