<script>
    // --- 37. REGISTRATION ACCOUNT INITIALIZATION COMPLIANCE & SUCCESS FLASH ENGINE ---
document.addEventListener('DOMContentLoaded', () => {
    const signupForm = document.getElementById('secureAuthSignupForm');
    const nameInput = document.getElementById('regClientName');
    const mobileInput = document.getElementById('regClientMobile');
    const emailInput = document.getElementById('regEmailAddress');
    const passwordInput = document.getElementById('regPasswordKey');
    const confirmInput = document.getElementById('regConfirmPasswordKey');
    const alertBanner = document.getElementById('signupPortalAlertBanner');
    const toggleButtons = document.querySelectorAll('.password-toggle-visibility-btn');

    if (signupForm && nameInput && mobileInput && passwordInput && confirmInput && alertBanner) {

        // 1. HARD ALPHABET FILTER BLOCK: Rejects numerical keyboard entries on your name string field instantly
        nameInput.addEventListener('input', () => {
            const currentCursorPosition = nameInput.selectionStart;
            const purifiedAlphaValue = nameInput.value.replace(/[0-9]/g, '');
            
            if (nameInput.value !== purifiedAlphaValue) {
                nameInput.value = purifiedAlphaValue;
                nameInput.setSelectionRange(currentCursorPosition - 1, currentCursorPosition - 1);
            }
        });

        // 2. HARD DIGIT FILTER BLOCK: Intercepts and purges literal alphabetical characters inside your phone telemetry field
        mobileInput.addEventListener('input', () => {
            const currentCursorPosition = mobileInput.selectionStart;
            const purifiedNumericValue = mobileInput.value.replace(/[^0-9]/g, '');
            
            if (mobileInput.value !== purifiedNumericValue) {
                mobileInput.value = purifiedNumericValue;
                mobileInput.setSelectionRange(currentCursorPosition - 1, currentCursorPosition - 1);
            }
        });

        // 3. UNMASK PASSWORD SELECTION CONTROLLER INDEPENDENT LOOPS
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetFieldId = btn.getAttribute('data-target');
                const targetField = document.getElementById(targetFieldId);
                
                if (targetField) {
                    const isMaskedState = targetField.getAttribute('type') === 'password';
                    targetField.setAttribute('type', isMaskedState ? 'text' : 'password');
                    btn.style.color = isMaskedState ? '#f59e0b' : '#475569';
                }
            });
        });

        // 4. MASTER HANDSHAKE CRITICAL FORM INTERCEPTION COMPLIANCE LOOPS
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault(); 

            // Clear active layout class lists states
            alertBanner.classList.remove('alert-active', 'alert-success');
            alertBanner.innerText = "";

            // Clear individual row input errors incidence fields indicators
            const inputsList = signupForm.querySelectorAll('input');
            inputsList.forEach(input => {
                input.closest('.signup-input-group')?.classList.remove('field-input-invalid');
            });

            let trackingValidationPassFlag = true;
            let criticalEmptyFieldFound = false;

            // Loop checking empty input fields parameters status parameters
            for (let i = 0; i < inputsList.length; i++) {
                const currentInputNode = inputsList[i];
                if (!currentInputNode.value.trim()) {
                    criticalEmptyFieldFound = true;
                    trackingValidationPassFlag = false;
                    currentInputNode.closest('.signup-input-group')?.classList.add('field-input-invalid');
                }
            }

            // A. EMPTY FIELD EXCEPTION BANNER TRIGGER
            if (criticalEmptyFieldFound) {
                alertBanner.innerText = "Please fill the fields before deploying account credentials.";
                alertBanner.classList.add('alert-active');
                return;
            }

            // B. SPECIFIC EMAIL RFC PATTERN STRUCTURAL CHECK FILTER
            const emailPatternStructure = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPatternStructure.test(emailInput.value.trim())) {
                trackingValidationPassFlag = false;
                emailInput.closest('.signup-input-group')?.classList.add('field-input-invalid');
                alertBanner.innerText = "Please enter a mathematically valid secure email configuration track address.";
                alertBanner.classList.add('alert-active');
                return;
            }

            // C. MOBILE DIGIT LENGTH COMPLIANCE TRACK FILTER
            if (mobileInput.value.trim().length !== 10) {
                trackingValidationPassFlag = false;
                mobileInput.closest('.signup-input-group')?.classList.add('field-input-invalid');
                alertBanner.innerText = "The mobile underwriting track telemetry must correspond to exactly 10 digits.";
                alertBanner.classList.add('alert-active');
                return;
            }

            // D. CRYPTOGRAPHIC PASSWORD SEQUENCE LOCK SYNC FILTER
            if (passwordInput.value !== confirmInput.value) {
                trackingValidationPassFlag = false;
                passwordInput.closest('.signup-input-group')?.classList.add('field-input-invalid');
                confirmInput.closest('.signup-input-group')?.classList.add('field-input-invalid');
                alertBanner.innerText = "Cryptographic password keys do not match. Re-verify entry strings.";
                alertBanner.classList.add('alert-active');
                return;
            }

            // E. FIXED EXCEPTION ROUTING PASS: Triggers green emerald notification, freezes button tracking inputs, and schedules login hotswap redirect [INDEX]
            if (trackingValidationPassFlag) {
                // Flash successful alert message configuration banner
                alertBanner.innerText = "Successfully signed in! Use credentials to login.";
                alertBanner.classList.add('alert-success');
                
                // Freeze submit action button to protect system from infinite thread duplication loops
                const executionBtn = signupForm.querySelector('.signup-submit-execution-btn');
                if (executionBtn) executionBtn.disabled = true;

                // Sets an absolute 3-second timing delay window before routing user smoothly back to login panel [INDEX]
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 3000);
            }
        });
    }
});

</script>
